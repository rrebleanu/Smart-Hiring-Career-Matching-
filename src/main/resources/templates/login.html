<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:replace="~{fragments/head :: head}"></div>
<body>
<header><h1>Smart Hiring Career Matching</h1></header>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="auth-container">
    <div class="auth-card">
        <button class="social-btn">Continuă cu Facebook</button>
        <div class="auth-separator">SAU</div>

        <div class="auth-tabs">
            <a th:href="@{/login}" class="auth-tab active">Intră în cont</a>
            <a th:href="@{/register}" class="auth-tab">Creează un cont</a>
        </div>

        <!-- Mesaj eroare login -->
        <p th:if="${param.error}" class="error-msg">
            Email sau parolă incorectă!
        </p>

        <!-- Mesaj succes după register -->
        <p th:if="${param.success}" class="success-msg">
            Cont creat cu succes! Intră în cont.
        </p>

        <!-- Mesaj după logout -->
        <p th:if="${param.logout}" class="success-msg">
            Ai ieșit din cont cu succes!
        </p>

        <!-- Action-ul trebuie să fie /login - gestionat de Spring Security -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Adresa ta de e-mail</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" name="parola" required>
            </div>
            <button type="submit" class="btn-submit">Intră în cont</button>
        </form>

        <p>Nu ai cont? <a th:href="@{/register}">Creează un cont</a></p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
