<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Creează cont - Job Portal</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/styleslogin.css}">
</head>
<body>
<header><h1>Smart Hiring Career Matching</h1></header>
<nav>
    <ul>
        <li><a th:href="@{/}">Home</a></li>
        <li th:if="${session.userLogat == null}"><a th:href="@{/login}">Login</a></li>
        <li th:if="${session.userLogat != null}"><a th:href="@{/logout}">Logout</a></li>
        <li th:if="${session.userLogat != null}"><a th:href="@{/jobs}">Jobs</a></li>
        <li th:if="${session.userLogat != null}"><a th:href="@{/companii}">Companii</a></li>
        <li><a th:href="@{/despre}">Despre Noi</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>
    </ul>
</nav>
<div class="auth-container">
    <div class="auth-card">
        <button class="social-btn">🔵 Continuă cu Facebook</button>
        <div class="auth-separator">SAU</div>

        <div class="auth-tabs">
            <a th:href="@{/login}" class="auth-tab">Intră în cont</a>
            <a th:href="@{/register}" class="auth-tab active">Creează un cont</a>
        </div>

        <p th:if="${error}" class="error-msg" th:text="${error}"></p>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Nume complet</label>
                <input type="text" name="nume" required>
            </div>
            <div class="form-group">
                <label>Adresa ta de e-mail</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" name="parola" required>
            </div>
            <button type="submit" class="btn-submit">Creează cont</button>
        </form>
    </div>
</div>
</body>
</html>
