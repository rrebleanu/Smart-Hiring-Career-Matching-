<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main style="max-width: 600px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2>Creează CV Digital</h2>
    <p>Completează detaliile tale profesionale pentru a fi vizibil angajatorilor.</p>
    <hr/>

    <form th:action="@{/cv/salveaza}" th:object="${cv}" method="post">
        <input type="hidden" th:field="*{idCv}" />

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; margin-bottom: 5px;">Telefon:</label>
            <input type="text" th:field="*{telefon}" required style="width:100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="07xx xxx xxx"/>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; margin-bottom: 5px;">Domeniu de Activitate:</label>
            <input type="text" th:field="*{domeniu}" required style="width:100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="ex: IT, Auto, Constructii"/>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold; margin-bottom: 5px;">Experiență Profesională:</label>
            <textarea th:field="*{experienta}" rows="4" style="width:100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="Descrie locurile de munca anterioare..."></textarea>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom: 5px;">Despre Mine:</label>
            <textarea th:field="*{descriereCandidat}" rows="4" style="width:100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" placeholder="Spune cateva cuvinte despre tine..."></textarea>
        </div>

        <button type="submit" class="btn-submit" style="width: 100%; padding: 10px; background-color: #8a1cb2; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Salvează CV-ul
        </button>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
