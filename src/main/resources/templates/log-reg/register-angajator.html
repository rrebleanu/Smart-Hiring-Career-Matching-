<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<div th:replace="~{fragments/head :: head}"></div>

<body>
<header><h1>Smart Hiring Career Matching</h1></header>

<div th:replace="~{fragments/nav :: nav}"></div>


<div class="auth-container">
    <div class="auth-card">
        <div class="auth-tabs">
            <a th:href="@{/login}" class="auth-tab">Intră în cont</a>
            <a th:href="@{/register}" class="auth-tab active">Creează un cont</a>
        </div>

        <h2>Cont Angajator</h2>
        <p>Ai deja un cont? <a th:href="@{/login}">Intră în cont</a></p>
        <p>Ești candidat? <a th:href="@{/register/candidat}">Creează cont candidat</a></p>

        <p th:if="${error}" class="error-msg" th:text="${error}"></p>

        <form th:action="@{/register/angajator}" method="post">
            <div class="form-group">
                <label>Nume complet</label>
                <input type="text" name="nume" required>
            </div>
            <div class="form-group">
                <label>Adresa ta de e-mail</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Parola</label>
                <input type="password" name="parola" required>
            </div>
<!--            <div class="form-group">-->
<!--                <label>Companie</label>-->
<!--                <input type="text" name="companie" required>-->
<!--            </div>-->

            <!-- DROPDOWN COMPANII -->
            <div class="form-group">
                <label>Companie</label>
                <select name="companieId">
                    <option value="">-- Selectează compania --</option>
                    <option th:each="c : ${companii}"
                            th:value="${c.id}"
                            th:text="${c.numeCompanie}">
                    </option>
                </select>
            </div>

            <!-- BUTON TOGGLE - reincarca pagina cu flag -->
            <a th:href="@{/register/angajator(creareNoua=true)}"
               th:unless="${creareNoua}">
                + Compania mea nu există
            </a>

            <!-- FORMULAR COMPANIE NOUA - apare doar daca creareNoua=true -->
            <div th:if="${creareNoua}" style="padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                <p style="font-weight: bold;">Creează companie nouă</p>
                <div class="form-group">
                    <label>Nume companie</label>
                    <input type="text" name="numeCompanieNoua" required>
                </div>
                <div class="form-group">
                    <label>Domeniu</label>
                    <input type="text" name="domeniu">
                </div>
                <div class="form-group">
                    <label>Locație</label>
                    <input type="text" name="locatie">
                </div>
                <a th:href="@{/register/angajator}">✕ Anulează</a>
            </div>

            <button type="submit" class="btn-submit">Creează cont</button>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
