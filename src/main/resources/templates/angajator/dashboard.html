<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
    <h1>Profil</h1>

    <form action="/cv/upload" method="post" enctype="multipart/form-data" class="mt-3">
        <div sec:authorize="hasRole('CANDIDAT')">
            <label>Încarcă CV (PDF):</label>
        <div class="mb-3">
            <label for="file">Selectează fișier (PDF sau DOCX)</label>
            <input type="file" id="file" name="file"
                   class="form-control" accept=".pdf,.docx" required>
        </div>
        <button type="submit" class="btn btn-primary">Încarcă</button>

        </div>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
