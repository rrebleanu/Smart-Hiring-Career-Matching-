<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
  <h1>Profilul Meu</h1>
  <form th:action="@{/dashboard/update}" method="post" enctype="multipart/form-data">
    <div>
      <label>Nume:</label>
      <input type="text" name="numeUser" th:value="${user.numeUser}" />
    </div>
    <div>
      <label>Email:</label>
      <input type="email" th:value="${user.email}" readonly />
    </div>

    <div th:if="${user instanceof T(com.project.demo.model.Candidat)}">
      <h3>Document CV (PDF)</h3>
      <div th:if="${user.cvPath == null}">
        <p>Nu ai încărcat un PDF.</p>
        <input type="file" name="cvFile" accept="application/pdf" />
      </div>
      <div th:if="${user.cvPath != null}">
        <p>CV actual: <a th:href="${user.cvPath}" target="_blank">Vezi PDF</a></p>
        <label>Înlocuiește PDF:</label>
        <input type="file" name="cvFile" accept="application/pdf" />
      </div>

      <hr/>

      <h3>Profilul Tău Profesional</h3>
      <div th:if="${user.cv == null}">
        <p>Nu ai completat încă detaliile din CV-ul digital.</p>
        <a th:href="@{/cv/nou}" class="btn-submit" style="display: inline-block; text-decoration: none;">Creează CV Digital</a>
      </div>

      <div th:if="${user.cv != null}">
        <p><strong>Telefon:</strong> <span th:text="${user.cv.telefon}"></span></p>
        <p><strong>Domeniu:</strong> <span th:text="${user.cv.domeniu}"></span></p>
        <p><strong>Experiență:</strong> <span th:text="${user.cv.experienta}"></span></p>
        <p><strong>Despre mine:</strong> <span th:text="${user.cv.descriereCandidat}"></span></p>
        <br/>
        <a th:href="@{/cv/nou}" class="btn-submit" style="display: inline-block; text-decoration: none;">Editează CV-ul</a>
      </div>
    </div>

    <button type="submit" class="btn-submit">Salvează Modificările</button>
  </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
