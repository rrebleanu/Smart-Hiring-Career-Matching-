<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:replace="~{fragments/head :: head}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main>
  <h1>Profilul meu</h1>

  <form th:action="@{/cv/upload}" method="post" enctype="multipart/form-data">
    <div sec:authorize="hasRole('CANDIDAT')">
      <label>Încarcă CV (PDF):</label>
      <div class="mb-3">
        <label for="file">Selectează fișier (PDF sau DOCX)</label>
        <input type="file" id="file" name="file"
                accept=".pdf,.docx" required>
      </div>
      <button type="submit">Încarcă</button>

    </div>
  </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
